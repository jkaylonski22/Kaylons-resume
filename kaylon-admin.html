<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaylon · Client Database</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #f4f6f3;
    --blue: #1a4d2e;
    --cyan: #2d7a4f;
    --gold: #1a4d2e;
    --white: #1c1c1c;
    --gray: #6b7280;
    --card: #ffffff;
    --border: #dde3d8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:linear-gradient(160deg, #1a4d2e 0%, #2d7a4f 30%, #a8d5b5 65%, #f0faf4 100%); background-attachment:fixed; color:var(--white); font-family:'Plus Jakarta Sans',sans-serif; min-height:100vh; }

  header {
    padding:20px 24px;
    background:linear-gradient(90deg,#1a4d2e,#2d7a4f);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:14px;
  }

  .avatar {
    width:46px; height:46px; border-radius:50%;
    background:linear-gradient(135deg,#ffffff,#e0ede6);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-size:22px; color:white;
    box-shadow:0 0 14px rgba(26,77,46,0.3);
  }

  header h1 { font-family:'Fraunces',serif; font-size:22px; letter-spacing:1.5px; }
  header p { font-size:12px; color:var(--gray); }

  .export-btn {
    margin-left:auto;
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.5);
    color:#ffffff;
    padding:9px 18px;
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:500;
    transition:background 0.2s;
  }
  .export-btn:hover { background:rgba(255,255,255,0.25); }

  .container { max-width:700px; margin:0 auto; padding:24px 16px; }

  .stats {
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px;
  }

  .stat-card {
    background:rgba(255,255,255,0.88); border:1px solid #d4edda; box-shadow:0 2px 10px rgba(26,77,46,0.08);
    border-radius:12px; padding:16px;
    text-align:center;
  }
  .stat-card .num {
    font-family:'Fraunces',serif; font-size:32px; color:#1a4d2e;
    line-height:1;
  }
  .stat-card .lbl { font-size:11px; color:var(--gray); margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }

  .search-bar {
    background:rgba(255,255,255,0.9);
    border:1px solid #c8e6c9;
    border-radius:10px;
    padding:11px 16px;
    color:var(--white);
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:14px;
    width:100%;
    outline:none;
    margin-bottom:16px;
    transition:border-color 0.2s;
  }
  .search-bar:focus { border-color:#c9a96e; }
  .search-bar::placeholder { color:var(--gray); }

  .section-title {
    font-family:'Fraunces',serif;
    font-size:16px; letter-spacing:1px;
    color:var(--gray);
    margin-bottom:10px;
  }

  .client-card {
    background:rgba(255,255,255,0.9);
    border:1px solid #d4edda;
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
    transition:border-color 0.2s;
    animation:fadeUp 0.3s ease forwards;
    opacity:0;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .client-card:hover { border-color:#1a4d2e; box-shadow:0 4px 12px rgba(26,77,46,0.1); }

  .client-top {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:8px;
  }

  .client-name { font-size:15px; font-weight:600; color:var(--white); }
  .client-date { font-size:11px; color:var(--gray); }

  .plan-badge {
    font-size:11px; padding:3px 10px; border-radius:12px; font-weight:500;
  }
  .plan-premium { background:rgba(201,169,110,0.15); color:#e8d5b0; border:1px solid rgba(201,169,110,0.3); }
  .plan-basic { background:rgba(201,169,110,0.08); color:#c9a96e; border:1px solid rgba(201,169,110,0.2); }

  .client-detail {
    display:flex; gap:16px; flex-wrap:wrap;
  }
  .detail-item { font-size:12px; color:var(--gray); display:flex; align-items:center; gap:5px; }
  .detail-item span { color:#c4cde0; }

  .empty-state {
    text-align:center; padding:60px 20px; color:var(--gray);
  }
  .empty-state .icon { font-size:40px; margin-bottom:12px; }
  .empty-state p { font-size:14px; line-height:1.6; }

  .filter-tabs {
    display:flex; gap:8px; margin-bottom:16px;
  }
  .tab {
    padding:7px 16px; border-radius:20px; font-size:12px; cursor:pointer;
    border:1px solid #c8e6c9; background:rgba(255,255,255,0.7); color:#1a4d2e;
    font-family:'Plus Jakarta Sans',sans-serif; transition:all 0.2s;
  }
  .tab.active { background:rgba(26,86,255,0.15); border-color:#c9a96e; color:var(--cyan); }
</style>
</head>
<body>

<header>
  <div class="avatar" style="color:#1a4d2e; font-family:'Fraunces', serif; font-size:22px; font-weight:700;">K</div>
  <div>
    <h1 style="color:#ffffff;">Client Database</h1>
    <p style="color:rgba(255,255,255,0.75);">Kaylon · Resume Builder</p>
  </div>
  <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
</header>

<div class="container">

  <div class="stats">
    <div class="stat-card">
      <div class="num" id="totalCount">—</div>
      <div class="lbl">Total Clients</div>
    </div>
    <div class="stat-card">
      <div class="num" id="premiumCount" style="color:#2d7a4f;">—</div>
      <div class="lbl">Premium ($60)</div>
    </div>
    <div class="stat-card">
      <div class="num" id="basicCount" style="color:#1a4d2e;">—</div>
      <div class="lbl">Basic ($20)</div>
    </div>
  </div>

  <input class="search-bar" id="searchInput" placeholder="🔍  Search by name, email, or role..." oninput="renderClients()" />

  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all', this)">All</button>
    <button class="tab" onclick="setFilter('premium', this)">Premium</button>
    <button class="tab" onclick="setFilter('basic', this)">Basic</button>
  </div>

  <div class="section-title" id="listLabel">All Clients</div>
  <div id="clientList"></div>
</div>

<script>
let allClients = [];
let activeFilter = 'all';

async function loadClients() {
  try {
    const result = await window.storage.list('client:', true);
    const keys = result?.keys || [];

    allClients = [];
    for (const key of keys) {
      try {
        const r = await window.storage.get(key, true);
        if (r?.value) allClients.push(JSON.parse(r.value));
      } catch(e) {}
    }

    allClients.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));

    // Stats
    document.getElementById('totalCount').textContent = allClients.length;
    document.getElementById('premiumCount').textContent = allClients.filter(c => c.plan?.includes('60')).length;
    document.getElementById('basicCount').textContent = allClients.filter(c => c.plan?.includes('20')).length;

    renderClients();
  } catch(e) {
    document.getElementById('clientList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Could not load client data.</p></div>';
  }
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderClients();
}

function renderClients() {
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = allClients.filter(c => {
    const matchesFilter = activeFilter === 'all'
      || (activeFilter === 'premium' && c.plan?.includes('60'))
      || (activeFilter === 'basic' && c.plan?.includes('20'));
    const matchesSearch = !search
      || (c.name||'').toLowerCase().includes(search)
      || (c.email||'').toLowerCase().includes(search)
      || (c.role||'').toLowerCase().includes(search);
    return matchesFilter && matchesSearch;
  });

  document.getElementById('listLabel').textContent = `${filtered.length} Client${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    document.getElementById('clientList').innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>${allClients.length === 0
          ? 'No clients yet. They\'ll appear here once they complete the chat flow and confirm payment.'
          : 'No clients match your search.'}</p>
      </div>`;
    return;
  }

  document.getElementById('clientList').innerHTML = filtered.map((c, i) => `
    <div class="client-card" style="animation-delay:${i * 40}ms;">
      <div class="client-top">
        <div>
          <div class="client-name">${c.name || 'Unknown'}</div>
          <div class="client-date">${c.date || ''}</div>
        </div>
        <div class="plan-badge ${c.plan?.includes('60') ? 'plan-premium' : 'plan-basic'}">${c.plan || 'Unknown'}</div>
      </div>
      <div class="client-detail">
        <div class="detail-item">✉ <span>${c.email || '—'}</span></div>
        <div class="detail-item">💼 <span>${c.role || 'Not specified'}</span></div>
      </div>
    </div>
  `).join('');
}

async function exportCSV() {
  const rows = [['Name','Email','Plan','Role','Date']];
  allClients.forEach(c => rows.push([c.name||'', c.email||'', c.plan||'', c.role||'', c.date||'']));
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kaylon_clients_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

loadClients();
</script>
</body>
</html>
